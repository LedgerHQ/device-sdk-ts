openapi: 3.0.3
info:
  title: Ledger Device Mock Server
  version: 0.1.0
  description: In-memory mock of the Ledger device transport contract. Every
    device and mock is scoped to a bearer-token session obtained from `POST
    /auth`.
  license:
    name: Apache-2.0
servers:
  - url: http://127.0.0.1:9752
    description: Local dev server
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Session creation
  - name: Sessions
    description: Current session resource
  - name: Devices
    description: Mocked devices and their lifecycle
  - name: Mocks
    description: Canned APDU responses
  - name: Speculos
    description: Control of the device-linked Speculos emulator
  - name: Transfer
    description: Import/export of session state
  - name: Health
    description: Liveness probe
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description:
        "Session token returned by `POST /auth`, sent as `Authorization:
        Bearer <token>`."
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    DeviceApp:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
      required:
        - name
        - version
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        device_type:
          type: string
          description: DeviceModelId enum value.
          example: nanoX
        connectivity_type:
          type: string
          example: USB
        firmware_version:
          type: string
        apps:
          type: array
          items:
            $ref: "#/components/schemas/DeviceApp"
        masks:
          type: array
          items:
            type: integer
        connected:
          type: boolean
      required:
        - id
        - name
        - device_type
        - connectivity_type
    DeviceConfig:
      type: object
      description: Payload to attach (POST) or edit (PATCH) a device.
      properties:
        name:
          type: string
        device_type:
          type: string
          example: nanoX
        connectivity_type:
          type: string
          example: USB
        firmware_version:
          type: string
        apps:
          type: array
          items:
            $ref: "#/components/schemas/DeviceApp"
        masks:
          type: array
          items:
            type: integer
        mocks:
          type: array
          description: Device-scoped APDU mocks (used on attach / import).
          items:
            $ref: "#/components/schemas/MockConfig"
    Mock:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prefix:
          type: string
          description: APDU prefix (hex).
          example: b0010000
        responses:
          type: array
          description:
            Ordered APDU responses (hex, status word included). Served one per
            matching APDU, looping back to the start once exhausted.
          items:
            type: string
          example:
            - 0105424f4c4f5309312e342e302d7263329000
      required:
        - id
        - prefix
        - responses
    MockConfig:
      type: object
      description:
        Payload to create (POST) or edit (PATCH) a mock. Provide either a
        single `response` or an ordered `responses` list.
      properties:
        prefix:
          type: string
          example: b0010000
        response:
          type: string
          description: "Single-response shorthand for `responses: [response]`."
          example: "9000"
        responses:
          type: array
          description: Ordered APDU responses served one per matching APDU.
          items:
            type: string
          example:
            - "9000"
            - "6985"
            - "9000"
      required:
        - prefix
    SessionExport:
      type: object
      description:
        Portable snapshot of a session's devices (each carrying its own
        mocks), produced by GET /export and consumed by POST /import.
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceConfig"
      required:
        - devices
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: integer
          format: int64
          description: Epoch ms.
        expires_at:
          type: integer
          format: int64
          description: Epoch ms.
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
      required:
        - id
        - created_at
        - expires_at
        - devices
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: integer
          format: int64
          description: Epoch ms.
      required:
        - token
        - expires_at
    ConnectionState:
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
        connected:
          type: boolean
      required:
        - device
        - connected
    ApduRequest:
      type: object
      properties:
        apdu:
          type: string
          description: APDU to send (hex).
          example: b0010000
      required:
        - apdu
    ApduResponse:
      type: object
      properties:
        response:
          type: string
          description: Matched APDU response (hex).
      required:
        - response
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok
        sessions:
          type: integer
      required:
        - status
        - sessions
    SeedUpdate:
      type: object
      description:
        BIP39 mnemonic for the session's Speculos emulator. ⚠️ Not secure —
        stored and transmitted in plaintext. Use only test/dummy mnemonics,
        never real production keys.
      properties:
        seed:
          type: string
          example:
            glory promote mansion idle axis finger extend february uncover one trip
            resolve toe
      required:
        - seed
  responses:
    Unauthorized:
      description: Missing, invalid or expired bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Request body is malformed or failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
paths:
  /export:
    get:
      tags:
        - Transfer
      summary: Export the session's devices and mocks
      responses:
        "200":
          description: A portable snapshot of the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /import:
    post:
      tags:
        - Transfer
      summary: Replace the session's devices and mocks with a snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionExport"
      responses:
        "200":
          description: The resulting (normalized) snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExport"
        "400":
          description: Malformed snapshot.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /sessions/current:
    get:
      tags:
        - Sessions
      summary: Get the current session
      responses:
        "200":
          description: The session resolved from the bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Sessions
      summary: Dispose the current session
      responses:
        "204":
          description: Session disposed.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /sessions/current/seed:
    put:
      tags:
        - Sessions
      summary: Set the Speculos seed for the current session
      description: |
        Overrides the BIP39 mnemonic forwarded to Speculos on every
        subsequent `/acquire` call within this session. Defaults to the
        well-known test mnemonic on session creation.

        **⚠️ Security warning — not secure.** The seed is stored in
        plaintext in server memory and transmitted in plaintext HTTP. Use
        only test/dummy mnemonics. Never supply a real production key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedUpdate"
      responses:
        "200":
          description: Seed updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedUpdate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /devices:
    get:
      tags:
        - Devices
      summary: List devices
      responses:
        "200":
          description: Devices owned by the session.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Devices
      summary: Attach a device
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceConfig"
      responses:
        "201":
          description: Device created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /devices/{id}:
    get:
      tags:
        - Devices
      summary: Get a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The device.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Devices
      summary: Edit a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The updated device.
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Devices
      summary: Remove a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Device removed.
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/connect:
    post:
      tags:
        - Devices
      summary: Connect a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection state.
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/disconnect:
    post:
      tags:
        - Devices
      summary: Disconnect a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection state.
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/apdu:
    post:
      tags:
        - Devices
      summary: Send an APDU to a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApduRequest"
      responses:
        "200":
          description: APDU response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApduResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/mocks:
    get:
      tags:
        - Mocks
      summary: List a device's mocks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mocks owned by the device.
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Mocks
      summary: Add a mock to a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockConfig"
      responses:
        "201":
          description: Mock created.
        "400":
          description: prefix and a response are required.
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Mocks
      summary: Clear a device's mocks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Mocks cleared.
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/mocks/{mockId}:
    patch:
      tags:
        - Mocks
      summary: Edit a device's mock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: mockId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The updated mock.
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Mocks
      summary: Remove a device's mock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: mockId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Mock removed.
        "404":
          $ref: "#/components/responses/NotFound"
  /devices/{id}/speculos:
    get:
      tags:
        - Speculos
      summary: Get the device's live Speculos instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The active Speculos instance.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: No active Speculos instance for the device.
  /devices/{id}/speculos/{path}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: path
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Speculos
      summary: Proxy a request to the device's Speculos instance
      responses:
        "200":
          description: The emulator response.
        "409":
          description: No active Speculos instance for the device.
  /auth:
    post:
      tags:
        - Auth
      summary: Create a session
      description: Creates an in-memory session and returns its bearer token.
      security: []
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Server is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
