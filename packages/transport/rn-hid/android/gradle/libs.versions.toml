[versions]
kotlin = "2.0.20"
minSdk = "30"
junit5 = "5.9.3"
compileSdk = "34"
targetSdk = "32"
coroutines = "1.7.3"
kotlinx-serialization = "1.8.21"
koin = "3.4.2"
ktlint = "12.0.3"

[plugins]
kotlinSerializationGradlePlugin = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlinx-serialization" }
ktlintPlugin = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint" }
mokkery = { id = "dev.mokkery", version = "2.4.0" }

[libraries]
#Core
kotlinGradlePlug = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
androidGradlePlug = { module = "com.android.tools.build:gradle", version = "8.3.2" }
androidJunit5 = { module = "de.mannodermaus.gradle.plugins:android-junit5", version = "1.8.2.1" }
desugaring = { module = "com.android.tools:desugar_jdk_libs", version = "2.0.4" }
detekt = { module = "io.gitlab.arturbosch.detekt:detekt-gradle-plugin", version = "1.23.1" }
googleServicesPlugin = { module = "com.google.gms:google-services", version = "4.4.2" }

#Android
androidCoreKtx = { module = "androidx.core:core-ktx", version = "1.13.1" }
androidSplashScreen = { module = "androidx.core:core-splashscreen", version = "1.0.1" }

accompanistPermission = { module = "com.google.accompanist:accompanist-permissions", version = "0.30.1" }
coil = { module = "io.coil-kt:coil-compose", version = "2.3.0" }
#Android test
androidJunit = { module = "androidx.test.ext:junit", version = "1.2.1" }
androidEspresso = { module = "androidx.test.espresso:espresso-core", version = "3.6.1" }
androidArcCore = { module = "androidx.arch.core:core-testing", version = "2.2.0" }
androidTestCoreKtx = { module = "androidx.test:core-ktx", version = "1.6.1" }
cucumber = { module = "io.cucumber:cucumber-android", version = "4.10.0" }
#Kotlin
kotlinStdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
kotlinCoroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinSerialization = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version ="1.5.1" }
kotlinDateTime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version = "0.6.1" }
#Kotlin test
junitJupiter = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junit5" }
junitEngine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit5" }
junitJupiterParam = { module = "org.junit.jupiter:junit-jupiter-params", version.ref = "junit5" }
mockk = { module = "io.mockk:mockk", version = "1.13.5" }
kotlinJunitTest = { module = "org.jetbrains.kotlin:kotlin-test-junit", version.ref = "kotlin" }
kotlinCoroutinesTest = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }
turbine = { module = "app.cash.turbine:turbine", version = "0.13.0" }
#Koin
koinCore = { module = "io.insert-koin:koin-core", version.ref = "koin" }
koinAndroid = { module = "io.insert-koin:koin-android", version.ref = "koin" }
koinNavigation = { module = "io.insert-koin:koin-androidx-navigation", version.ref = "koin" }
#Utils
timber = { module = "com.jakewharton.timber:timber", version = "5.0.1" }
#Lottie

#Json
moshiCore = { module = "com.squareup.moshi:moshi", version = "1.15.1" }
moshiKotlin = { module = "com.squareup.moshi:moshi-kotlin", version = "1.12.0" }

buffer = { module = "com.ditchoom:buffer", version = "1.4.2" }

[bundles]
androidTest = ["androidJunit", "androidEspresso", "androidTestCoreKtx", "cucumber"]
kotlinBundle = ["kotlinStdlib", "kotlinCoroutines", "kotlinDateTime", "mockk", "kotlinJunitTest", "kotlinCoroutinesTest"]
kotlinTest = ["junitJupiter", "junitEngine", "junitJupiterParam", "mockk", "kotlinJunitTest", "kotlinCoroutinesTest", "turbine"]
koinAndroidBase = ["koinAndroid"]
moshi = [ "moshiCore", "moshiKotlin"]