buildscript {
  ext {
    kotlin_version = '1.9.24'
  }
  repositories {
    mavenCentral()
    google()
    maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
  }

  dependencies {
    classpath 'com.android.tools.build:gradle:8.3.2'
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
  }
}

allprojects {
  repositories {
    mavenCentral()
    google()
    maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "com.ledger.com.ledger.androidtransporthid.androidtransporthid"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 30)
    targetSdkVersion safeExtGet("targetSdkVersion", 32)
    versionCode 1
    versionName "1.0"
  }
  lintOptions {
    abortOnError false
    warning 'InvalidPackage'
  }
}

repositories {
  mavenCentral()
  google()
  maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
  maven {
    // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
    url "$rootDir/../node_modules/react-native/android"
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:+'
  implementation(libs.androidCoreKtx)
  implementation(libs.bundles.kotlinBundle)
  implementation(libs.bundles.koinAndroidBase)
  implementation(libs.timber)
  implementation(libs.koinCore)
  implementation(libs.buffer)
}
