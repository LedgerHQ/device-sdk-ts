name: "Publish packages to JFrog"
description: "Login to JFrog, setup npm config, and publish packages from dist directory"

# This action is used to publish packages to JFrog using pnpm.
# It is used in the snapshot_release.yml and release.yml workflows.
# It will iterate over all .tgz packages in the dist directory and publish them to JFrog.
#
# We can't use the pnpm changeset publish command directly as the packages have already been packed in the public runner.

inputs:
  npm-registry:
    description: "NPM registry URL (without https://)"
    required: true
  dist-path:
    description: "Path to directory containing .tgz packages"
    required: false
    default: "dist"
  npm-tag:
    description: "NPM tag to publish with (e.g., 'latest', 'develop')"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Login to internal JFrog registry
      id: jfrog-login
      uses: LedgerHQ/actions-security/actions/jfrog-login@actions/jfrog-login-1

    - name: Setup npm config for JFrog
      shell: bash
      env:
        NPM_REGISTRY_TOKEN: ${{ steps.jfrog-login.outputs.oidc-token }}
        NPM_REGISTRY: ${{ inputs.npm-registry }}
      run: |
        cat << EOF | tee .npmrc
        enable-pre-post-scripts=true
        registry=https://${NPM_REGISTRY}/
        //${NPM_REGISTRY}/:_authToken=${NPM_REGISTRY_TOKEN}
        EOF

    - name: Publish packages to JFrog using pnpm
      shell: bash
      env:
        NPM_REGISTRY: ${{ inputs.npm-registry }}
        DIST_PATH: ${{ inputs.dist-path }}
        NPM_TAG: ${{ inputs.npm-tag }}
      run: |
        cd "$DIST_PATH"
        shopt -s nullglob
        published=0
        published_packages="$(mktemp)"
        unpublished_packages="$(mktemp)"

        # Build publish command with optional tag
        publish_cmd="pnpm publish \"\$tarball\" --registry https://\${NPM_REGISTRY}/ --no-git-checks"
        if [ -n "$NPM_TAG" ]; then
          publish_cmd="$publish_cmd --tag $NPM_TAG"
        fi

        package_metadata() {
          local tarball="$1"
          node - "$tarball" <<'NODE'
        const { execFileSync } = require("node:child_process");

        const tarball = process.argv[2];
        const packageJson = JSON.parse(
          execFileSync("tar", ["-xOf", tarball, "package/package.json"], {
            encoding: "utf8",
          }),
        );

        process.stdout.write(`${packageJson.name}\t${packageJson.version}`);
        NODE
        }

        npm_link() {
          local name="$1"
          local version="$2"
          local link

          link="$(npm view "${name}@${version}" dist.tarball --registry "https://${NPM_REGISTRY}/" 2>/dev/null || true)"

          if [ -z "$link" ]; then
            link="$(node -e 'const [registry, name] = process.argv.slice(1); console.log(`https://${registry.replace(/\/$/, "")}/${encodeURIComponent(name)}`);' "$NPM_REGISTRY" "$name")"
          fi

          printf "%s" "$link"
        }

        write_package_summary() {
          if [ -z "$NPM_TAG" ] || [ -z "${GITHUB_STEP_SUMMARY:-}" ]; then
            return
          fi

          {
            echo "## Snapshot packages"
            echo ""
            echo "### Released"
            echo ""

            if [ -s "$published_packages" ]; then
              echo "| Package | Version | npm link |"
              echo "| --- | --- | --- |"
              while IFS=$'\t' read -r name version link; do
                echo "| \`${name}\` | \`${version}\` | [npm](${link}) |"
              done < "$published_packages"
            else
              echo "_No packages were released._"
            fi

            echo ""
            echo "### Not Released"
            echo ""

            if [ -s "$unpublished_packages" ]; then
              echo "| Package | Version | Reason |"
              echo "| --- | --- | --- |"
              while IFS=$'\t' read -r name version reason; do
                echo "| \`${name}\` | \`${version}\` | ${reason} |"
              done < "$unpublished_packages"
            else
              echo "_All packages were released._"
            fi

            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
        }

        for tarball in *.tgz; do
          metadata="$(package_metadata "$tarball")"
          name="${metadata%%$'\t'*}"
          version="${metadata#*$'\t'}"

          if eval "$publish_cmd"; then
            published=$((published + 1))
            printf "%s\t%s\t%s\n" "$name" "$version" "$(npm_link "$name" "$version")" >> "$published_packages"
          else
            echo "⚠️ Failed to publish $tarball"
            printf "%s\t%s\t%s\n" "$name" "$version" "Publish command failed" >> "$unpublished_packages"
          fi
        done

        write_package_summary

        if [ $published -eq 0 ]; then
          echo "❌ No packages were successfully published"
          exit 1
        fi
        echo "✅ Successfully published $published package(s)"
