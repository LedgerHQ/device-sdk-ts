name: "Clear Signing Tester"
description: "Run a single Clear Signing Tester cell (one device, one test) against Speculos."

inputs:
  runner:
    description: "pnpm script (cs-tester for ETH, cs-tester:solana for Solana)"
    required: true
  test:
    description: "Single test command (e.g. test:raw:complete)"
    required: true
  dapp:
    description: "Optional positional argument forwarded to the pnpm script (e.g. ERC7730 dapp/provider)"
    required: false
    default: ""
  device:
    description: "Single device type (stax, nanox, flex)"
    required: true
  coin-app:
    description: "Coin app name for ELF sparse checkout (Ethereum or Solana)"
    required: true
  artifact-prefix:
    description: "Prefix for uploaded artifact names"
    required: true
  summary-prefix:
    description: "Prefix for GitHub step summary titles"
    required: true
  use-rpc:
    description: "Include Solana RPC flags (--rpc-url, --scan-limit, --samples-per-instruction)"
    required: false
    default: "false"
  scan-limit:
    description: "Number of signatures to scan (only when use-rpc is true)"
    required: false
    default: "1000"
  samples-per-instruction:
    description: "Samples per instruction type (only when use-rpc is true)"
    required: false
    default: "20"
  log-level:
    description: "Console log level (omit to use app default)"
    required: false
    default: ""
  enable-file-logging:
    description: "Enable file logging and screenshots"
    required: false
    default: "false"
  gh-bot-app-id:
    description: "GitHub App ID for coin-apps checkout"
    required: true
  gh-bot-private-key:
    description: "GitHub App private key for coin-apps checkout"
    required: true
  gating-token:
    description: "Clear signing gating token"
    required: true
  solana-rpc-url:
    description: "Solana RPC URL (required when use-rpc is true)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

    - name: Generate token
      id: generate-token
      uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
      with:
        app-id: ${{ inputs.gh-bot-app-id }}
        private-key: ${{ inputs.gh-bot-private-key }}
        owner: LedgerHQ
        repositories: coin-apps

    - name: Retrieving coin apps
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: master
        repository: LedgerHQ/coin-apps
        token: ${{ steps.generate-token.outputs.token }}
        path: coin-apps
        sparse-checkout: |
          ${{ inputs.device }}/*/${{ inputs.coin-app }}/*.elf
        sparse-checkout-cone-mode: false

    - name: Pull Speculos Docker image
      shell: bash
      run: docker pull ghcr.io/ledgerhq/speculos

    - name: Run Clear Signing Test
      shell: bash
      env:
        FORCE_COLOR: "0"
        GATING_TOKEN: ${{ inputs.gating-token }}
        COIN_APPS_PATH: "${{ github.workspace }}/coin-apps"
        SOLANA_RPC_URL: ${{ inputs.solana-rpc-url }}
        INPUT_DEVICE: ${{ inputs.device }}
        INPUT_LOG_LEVEL: ${{ inputs.log-level }}
        INPUT_USE_RPC: ${{ inputs.use-rpc }}
        INPUT_SCAN_LIMIT: ${{ inputs.scan-limit }}
        INPUT_SAMPLES_PER_INSTRUCTION: ${{ inputs.samples-per-instruction }}
        INPUT_ENABLE_FILE_LOGGING: ${{ inputs.enable-file-logging }}
        INPUT_TEST: ${{ inputs.test }}
        INPUT_DAPP: ${{ inputs.dapp }}
        INPUT_RUNNER: ${{ inputs.runner }}
      run: |
        set -o pipefail
        mkdir -p /tmp/logs/screenshots

        ARGS=("--device" "$INPUT_DEVICE")

        if [ -n "$INPUT_LOG_LEVEL" ]; then
          ARGS+=("--log-level" "$INPUT_LOG_LEVEL")
        fi

        if [ "$INPUT_USE_RPC" = "true" ]; then
          ARGS+=("--rpc-url" "$SOLANA_RPC_URL")
          ARGS+=("--scan-limit" "$INPUT_SCAN_LIMIT")
          ARGS+=("--samples-per-instruction" "$INPUT_SAMPLES_PER_INSTRUCTION")
        fi

        if [ "$INPUT_ENABLE_FILE_LOGGING" = "true" ]; then
          SAFE_NAME=$(echo "${INPUT_TEST}${INPUT_DAPP:+-$INPUT_DAPP}" | tr ':/ ' '-')
          ARGS+=("--log-file" "/tmp/logs/${SAFE_NAME}.log")
          ARGS+=("--file-log-level" "debug")
          ARGS+=("--screenshot-folder-path" "/tmp/logs/screenshots")
        fi

        PNPM_TEST_ARGS=("$INPUT_TEST")
        if [ -n "$INPUT_DAPP" ]; then
          PNPM_TEST_ARGS+=("$INPUT_DAPP")
        fi

        pnpm "$INPUT_RUNNER" "${PNPM_TEST_ARGS[@]}" "${ARGS[@]}" 2>&1 | tee /tmp/cs-tester-output.log

    - name: Write job summary
      if: always()
      shell: bash
      env:
        INPUT_SUMMARY_PREFIX: ${{ inputs.summary-prefix }}
        INPUT_DEVICE: ${{ inputs.device }}
        INPUT_TEST: ${{ inputs.test }}
        INPUT_DAPP: ${{ inputs.dapp }}
      run: |
        {
          echo "## ${INPUT_SUMMARY_PREFIX} (${INPUT_DEVICE} - ${INPUT_TEST}${INPUT_DAPP:+ ${INPUT_DAPP}})"
          echo ""
          if [ -f /tmp/cs-tester-output.log ]; then
            echo '```'
            sed -n '/TEST RESULTS\|PROGRAM TEST\|📋/,/^└/p' /tmp/cs-tester-output.log
            echo ""
            sed -n '/SUMMARY\|PROGRAM SUMMARY\|📊/,/^└/p' /tmp/cs-tester-output.log
            echo '```'
          else
            echo "No test output available"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Sanitise artifact name
      if: always()
      id: artifact
      shell: bash
      env:
        INPUT_ARTIFACT_PREFIX: ${{ inputs.artifact-prefix }}
        INPUT_DEVICE: ${{ inputs.device }}
        INPUT_TEST: ${{ inputs.test }}
        INPUT_DAPP: ${{ inputs.dapp }}
      run: |
        name=$(echo "${INPUT_ARTIFACT_PREFIX}-${INPUT_DEVICE}-${INPUT_TEST}${INPUT_DAPP:+-$INPUT_DAPP}" | tr ':/ ' '-')
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: /tmp/logs/
        retention-days: 7
