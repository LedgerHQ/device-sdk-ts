name: "[Release] Build mobile sample app"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: The base branch to build mobile app from
        required: false
        default: "develop"

env:
  FORCE_COLOR: "1"
  REF: ${{ inputs.ref }}
  TAG: ${{ inputs.tag }}

permissions:
  id-token: write
  contents: write

jobs:
  build-android:
    name: Build android app
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@develop

      - name: Set Up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: "zulu" # See 'Supported distributions' for available options
          java-version: "20"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Build libs
        run: pnpm build:libs

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: ./apps/mobile/android

      - name: Upload APK to github
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dmk-sample.apk
          path: ./apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK to firebase
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE_CONTENT }}
          groups: dxp
          file: ./apps/mobile/android/app/build/outputs/apk/release/app-release.apk
