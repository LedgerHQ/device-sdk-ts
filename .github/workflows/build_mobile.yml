name: "[Release] Build mobile sample app"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: The base branch to build mobile app from
        required: false
        default: "develop"

env:
  FORCE_COLOR: "1"
  REF: ${{ inputs.ref }}
  TAG: ${{ inputs.tag }}

permissions:
  id-token: write
  contents: write

jobs:
  build-android:
    name: Build android app
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@cc38a0dd9f30cf2f63ef50e4d857f0197003e23d

      - name: Set Up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: "zulu" # See 'Supported distributions' for available options
          java-version: "20"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Build libs
        run: pnpm build:libs

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: ./apps/mobile/android

      - name: Upload APK to github
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dmk-sample.apk
          path: ./apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK to firebase
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE_CONTENT }}
          groups: dxp
          file: ./apps/mobile/android/app/build/outputs/apk/release/app-release.apk
