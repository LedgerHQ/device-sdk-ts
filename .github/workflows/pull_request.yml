name: "[Checks] Pull Request"
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches-ignore:
      - main

env:
  FORCE_COLOR: "1"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'develop' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-assign:
    name: Auto assign
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - uses: toshimaru/auto-author-assign@3e19bfc990cb1cf0589dce95e9f75289bb1e22de # v3.0.3

  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-22.04
    outputs:
      context-module: ${{ steps.filter.outputs.context-module }}
      signer-eth: ${{ steps.filter.outputs.signer-eth }}
      signer-solana: ${{ steps.filter.outputs.signer-solana }}
      signer-utils: ${{ steps.filter.outputs.signer-utils }}
      solana-tools: ${{ steps.filter.outputs.solana-tools }}
      cs-tester: ${{ steps.filter.outputs.cs-tester }}
      should-run-ethereum-cs-tester: ${{ steps.filter.outputs.signer-eth == 'true' || steps.filter.outputs.context-module == 'true' || steps.filter.outputs.signer-utils == 'true' || steps.filter.outputs.cs-tester == 'true' }}
      should-run-solana-cs-tester: ${{ steps.filter.outputs.signer-solana == 'true' || steps.filter.outputs.context-module == 'true' || steps.filter.outputs.signer-utils == 'true' || steps.filter.outputs.cs-tester == 'true' || steps.filter.outputs.solana-tools == 'true' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            context-module:
              - 'packages/signer/context-module/**'
            signer-eth:
              - 'packages/signer/signer-eth/**'
            signer-solana:
              - 'packages/signer/signer-solana/**'
            signer-utils:
              - 'packages/signer/signer-utils/**'
            solana-tools:
              - 'packages/tools/solana-tools/**'
            cs-tester:
              - 'apps/clear-signing-tester/**'
              - '.github/**'

  setup:
    name: Setup toolchain and dependencies
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@782348bef82aa368dab022732397062155f65666

  danger:
    name: Run Danger check
    needs: [setup]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@782348bef82aa368dab022732397062155f65666

      - name: Danger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Workaround when using custom runners
          # https://github.com/danger/danger-js/issues/1374
          DANGER_GITHUB_API_BASE_URL: "https://api.github.com"
        run: pnpm danger:ci

  build-libraries:
    name: Build libraries and apps
    needs: [setup]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      # Cache the sample app production build so the sample-integration job can
      # reuse it instead of rebuilding before the Playwright run.
      - name: Cache sample app build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: apps/sample/.next
          key: ${{ runner.os }}-sample-next-${{ github.sha }}

      - name: Build apps
        run: pnpm build

  prettier:
    name: Run prettier
    needs: [build-libraries]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      - name: Prettier
        id: prettier
        run: pnpm prettier

  lint:
    name: Run lint
    needs: [build-libraries]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      - name: Lint
        id: lint
        run: pnpm lint

  typecheck:
    name: Run typecheck
    needs: [build-libraries]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck

  tests:
    name: Run unit tests
    needs: [build-libraries]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      - name: Tests
        id: unit-tests
        run: pnpm test:coverage

      - uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        if: ${{ steps.unit-tests.conclusion == 'success' && github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sample-integration:
    name: Run playwright
    needs: [build-libraries]
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@782348bef82aa368dab022732397062155f65666

      # Reuse the sample app build produced by build-libraries; start-servers.sh
      # then skips the build and starts the prebuilt app directly.
      - name: Restore sample app build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: apps/sample/.next
          key: ${{ runner.os }}-sample-next-${{ github.sha }}

      - name: Install Playwright browsers
        run: pnpm --filter @ledgerhq/device-management-kit-sample exec playwright install --with-deps chromium

      - name: Run sample Playwright tests
        # The Playwright webServer (start-servers.sh) starts both the device mock
        # server and the sample app, so neither is launched here.
        run: pnpm --filter @ledgerhq/device-management-kit-sample test:playwright

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() }}
        with:
          name: sample-playwright-traces
          path: apps/sample/test-results
          if-no-files-found: ignore
          retention-days: 7

  health-check:
    name: Run health check
    # Aggregates the split checks and tests into a single required status so
    # branch protection only needs to require "Run health check".
    needs: [build-libraries, prettier, lint, typecheck, tests, sample-integration]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Check results
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed."

  cs-tester:
    needs: [build-libraries, detect-changes]
    if: needs.detect-changes.outputs.should-run-ethereum-cs-tester == 'true'
    name: Ethereum Clear Signing Test (${{ matrix.device }} - ${{ matrix.test }})
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        device: [stax, nanox]
        test:
          - test:raw:complete
          - test:raw:multisig
          - test:typed-data:multisig
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/cs-tester-composite
        with:
          runner: cs-tester
          test: ${{ matrix.test }}
          device: ${{ matrix.device }}
          coin-app: Ethereum
          artifact-prefix: eth-cs-tester-logs
          summary-prefix: "Ethereum Clear Signing Test"
          gh-bot-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-bot-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          gating-token: ${{ secrets.GATING_TOKEN }}
          solana-rpc-url: ${{ secrets.SOLANA_LEDGER_RPC_URL }}

  solana-cs-tester:
    needs: [build-libraries, detect-changes]
    if: needs.detect-changes.outputs.should-run-solana-cs-tester == 'true'
    name: Solana Fixture Test (${{ matrix.device }} - ${{ matrix.test }})
    runs-on: ${{ !github.event.pull_request.head.repo.fork && 'ledgerhq-device-sdk' || 'ubuntu-22.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        device: [stax, nanox]
        test:
          - test:solana:system-transfers
          - test:solana:spl-legacy
          - test:solana:spl-token2022
          - test:solana:stake
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ./.github/actions/cs-tester-composite
        with:
          runner: cs-tester:solana
          test: ${{ matrix.test }}
          device: ${{ matrix.device }}
          coin-app: Solana
          artifact-prefix: solana-cs-tester-logs
          summary-prefix: "Solana Fixture Test"
          gh-bot-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-bot-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          gating-token: ${{ secrets.GATING_TOKEN }}
          solana-rpc-url: ${{ secrets.SOLANA_LEDGER_RPC_URL }}
