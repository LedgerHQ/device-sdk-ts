name: "[Tests] Ethereum Nightly"
on:
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  FORCE_COLOR: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup toolchain and dependencies
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@develop

  build-libraries:
    name: Build libraries
    needs: [setup]
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

  erc7730-calldata-tests:
    needs: [build-libraries]
    name: ERC7730 Calldata Test (${{ matrix.device }} - ${{ matrix.test }})
    runs-on: ledgerhq-device-sdk
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        device: [stax, nanox, flex]
        test:
          - "test:erc7730 1inch"
          - "test:erc7730 aave"
          - "test:erc7730 ethena"
          - "test:erc7730 lido"
          - "test:erc7730 lombard"
          - "test:erc7730 poap"
          - "test:erc7730 swissborg"
          - "test:erc7730 tether"
          - "test:erc7730 uniswap"
          - "test:erc7730 velora"
          - "test:erc7730 yieldxyz"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cs-tester-composite
        with:
          runner: cs-tester
          test: ${{ matrix.test }}
          device: ${{ matrix.device }}
          coin-app: Ethereum
          log-level: error
          enable-file-logging: "true"
          artifact-prefix: erc7730-calldata-logs
          summary-prefix: "ERC7730 Calldata Test"
          gh-bot-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-bot-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          gating-token: ${{ secrets.GATING_TOKEN }}
          solana-rpc-url: ${{ secrets.SOLANA_LEDGER_RPC_URL }}

  erc7730-ethereum-tests:
    needs: [build-libraries]
    name: ERC7730 Ethereum Test (${{ matrix.device }} - ${{ matrix.test }})
    runs-on: ledgerhq-device-sdk
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        device: [stax, nanox, flex]
        test:
          - "test:erc7730:typed-data 1inch"
          - "test:erc7730:typed-data degate"
          - "test:erc7730:typed-data ledgerquest"
          - "test:erc7730:typed-data lens"
          - "test:erc7730:typed-data lombard"
          - "test:erc7730:typed-data opensea"
          - "test:erc7730:typed-data permit"
          - "test:erc7730:typed-data smartcredit"
          - "test:erc7730:typed-data tally"
          - "test:erc7730:typed-data uniswap"
          - "test:erc7730:typed-data velora"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cs-tester-composite
        with:
          runner: cs-tester
          test: ${{ matrix.test }}
          device: ${{ matrix.device }}
          coin-app: Ethereum
          log-level: error
          enable-file-logging: "true"
          artifact-prefix: erc7730-ethereum-logs
          summary-prefix: "ERC7730 Ethereum Test"
          gh-bot-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-bot-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          gating-token: ${{ secrets.GATING_TOKEN }}
          solana-rpc-url: ${{ secrets.SOLANA_LEDGER_RPC_URL }}
