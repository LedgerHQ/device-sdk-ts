name: "[Checks] Merge Queue"
on:
  merge_group:

env:
  FORCE_COLOR: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'develop' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-libraries:
    name: Build libraries
    runs-on: "ledgerhq-device-sdk"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@40058771e77535100741a4333cafee71175b3ff6

  prettier:
    name: Run prettier
    needs: [build-libraries]
    runs-on: "ledgerhq-device-sdk"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@40058771e77535100741a4333cafee71175b3ff6

      - name: Prettier
        id: prettier
        run: pnpm prettier

  lint:
    name: Run lint
    needs: [build-libraries]
    runs-on: "ledgerhq-device-sdk"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@40058771e77535100741a4333cafee71175b3ff6

      - name: Lint
        id: lint
        run: pnpm lint

  typecheck:
    name: Run typecheck
    needs: [build-libraries]
    runs-on: "ledgerhq-device-sdk"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@40058771e77535100741a4333cafee71175b3ff6

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck

  tests:
    name: Run unit tests
    needs: [build-libraries]
    runs-on: "ledgerhq-device-sdk"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@40058771e77535100741a4333cafee71175b3ff6

      - name: Tests
        id: unit-tests
        run: pnpm test

  health-check:
    name: Run health check
    # Aggregates the split checks and tests into a single required status so
    # branch protection only needs to require "Run health check".
    needs: [build-libraries, prettier, lint, typecheck, tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Check results
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed."
