name: "Test Workflow [Slack Notification]"

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Notification title/text to display in Slack."
        required: true
        type: string
        default: "Test Slack Notification"
      status:
        description: "Status to send to the Slack notify composite action."
        required: true
        type: choice
        default: success
        options:
          - success
          - error

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Map status to composite action result
        id: map
        shell: bash
        env:
          STATUS: ${{ inputs.status }}
        run: |
          if [ "$STATUS" = "error" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Slack
        uses: slackapi/slack-github-action@v3.0.2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_CHANNEL_ID }}
            text: ":white_check_mark: Test Slack Notification: Success"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "Section Test"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View workflow run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: ./.github/actions/slack-notify-composite
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ vars.SLACK_CHANNEL_ID }}
          title: ${{ inputs.text }}
          results: ${{ steps.map.outputs.result }}
