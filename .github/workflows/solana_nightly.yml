name: "[Tests] Solana Nightly"
on:
  schedule:
    # Run every day at 3:00 AM UTC (offset from Ethereum/ERC7730 nightly at 2:00 AM)
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_COLOR: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup toolchain and dependencies
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@develop

  build-libraries:
    name: Build libraries
    needs: [setup]
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

  solana-cs-tester:
    needs: [build-libraries]
    uses: ./.github/workflows/cs-tester-reusable.yml
    with:
      runner: cs-tester:solana
      tests: '["test:solana:system-transfers", "test:solana:spl-legacy", "test:solana:spl-token2022", "test:solana:stake"]'
      devices: '["stax", "nanox", "flex"]'
      coin-app: Solana
      log-level: error
      enable-file-logging: true
      artifact-prefix: solana-cs-tester-logs
      summary-prefix: "Solana Fixture Test"
    secrets: inherit

  solana-program-cs-tester:
    needs: [build-libraries]
    uses: ./.github/workflows/cs-tester-reusable.yml
    with:
      runner: cs-tester:solana
      tests: '["test:solana:program:system", "test:solana:program:stake", "test:solana:program:spl-token", "test:solana:program:token-2022"]'
      devices: '["stax", "nanox", "flex"]'
      coin-app: Solana
      use-rpc: true
      log-level: error
      enable-file-logging: true
      artifact-prefix: solana-program-cs-tester-logs
      summary-prefix: "Solana Program Test"
    secrets: inherit
