name: "[Tests] Solana Nightly"
on:
  schedule:
    # Run every day at 3:00 AM UTC (offset from Ethereum/ERC7730 nightly at 2:00 AM)
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_COLOR: "1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup toolchain and dependencies
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-cache-composite@develop

  build-libraries:
    name: Build libraries
    needs: [setup]
    runs-on: ledgerhq-device-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

  solana-cs-tester:
    name: Solana Clear Signing Tests (${{ matrix.device }} - ${{ matrix.test }})
    needs: [build-libraries]
    runs-on: ledgerhq-device-sdk
    strategy:
      fail-fast: false
      matrix:
        device:
          - stax
          - nanox
          - flex
        test:
          - test:solana:system-transfers
          - test:solana:spl-legacy
          - test:solana:spl-token2022
          - test:solana:stake
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          owner: LedgerHQ
          repositories: coin-apps

      - name: Retrieving coin apps
        uses: actions/checkout@v6
        with:
          ref: master
          repository: LedgerHQ/coin-apps
          token: ${{ steps.generate-token.outputs.token }}
          path: coin-apps
          sparse-checkout: |
            ${{ matrix.device }}/*/Solana/*.elf
          sparse-checkout-cone-mode: false

      - name: Pull Speculos Docker image
        run: docker pull ghcr.io/ledgerhq/speculos

      - name: Run Solana Clear Signing Test
        id: solana-cs-test
        env:
          FORCE_COLOR: "0"
          GATING_TOKEN: ${{ secrets.GATING_TOKEN }}
          COIN_APPS_PATH: "${{ github.workspace }}/coin-apps"
        run: |
          set -o pipefail
          mkdir -p /tmp/logs/screenshots
          pnpm cs-tester:solana ${{ matrix.test }} \
            --device ${{ matrix.device }} \
            --log-level error \
            --log-file "/tmp/logs/solana-${{ matrix.test }}.log" \
            --file-log-level debug \
            --screenshot-folder-path "/tmp/logs/screenshots" \
            2>&1 | tee /tmp/solana-cs-tester-output.log

      - name: Write job summary
        if: always()
        run: |
          echo "## Solana Clear Signing Test Results (${{ matrix.device }} - ${{ matrix.test }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/solana-cs-tester-output.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            sed -n '/📋/,/^└/p' /tmp/solana-cs-tester-output.log >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '/📊/,/^└/p' /tmp/solana-cs-tester-output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test output available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: solana-cs-tester-logs-${{ matrix.device }}-${{ matrix.test }}
          path: /tmp/logs/
          retention-days: 7

  solana-program-cs-tester:
    name: Solana Program Tests (${{ matrix.device }} - ${{ matrix.program }})
    needs: [build-libraries]
    runs-on: ledgerhq-device-sdk
    strategy:
      fail-fast: false
      matrix:
        device:
          - stax
          - nanox
          - flex
        program:
          - system
          - stake
          - spl-token
          - token-2022
    steps:
      - uses: actions/checkout@v6

      - uses: LedgerHQ/device-sdk-ts/.github/actions/setup-with-build-cache-composite@develop

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          owner: LedgerHQ
          repositories: coin-apps

      - name: Retrieving coin apps
        uses: actions/checkout@v6
        with:
          ref: master
          repository: LedgerHQ/coin-apps
          token: ${{ steps.generate-token.outputs.token }}
          path: coin-apps
          sparse-checkout: |
            ${{ matrix.device }}/*/Solana/*.elf
          sparse-checkout-cone-mode: false

      - name: Pull Speculos Docker image
        run: docker pull ghcr.io/ledgerhq/speculos

      - name: Run Solana Program Clear Signing Test
        id: solana-program-cs-test
        env:
          FORCE_COLOR: "0"
          GATING_TOKEN: ${{ secrets.GATING_TOKEN }}
          COIN_APPS_PATH: "${{ github.workspace }}/coin-apps"
        run: |
          set -o pipefail
          mkdir -p /tmp/logs/screenshots
          pnpm cs-tester:solana test:solana:program:${{ matrix.program }} \
            --device ${{ matrix.device }} \
            --rpc-url "${{ secrets.SOLANA_LEDGER_RPC_URL }}" \
            --scan-limit 1000 \
            --samples-per-instruction 20 \
            --log-level error \
            --log-file "/tmp/logs/solana-program-${{ matrix.program }}.log" \
            --file-log-level debug \
            --screenshot-folder-path "/tmp/logs/screenshots" \
            2>&1 | tee /tmp/solana-program-cs-tester-output.log

      - name: Write job summary
        if: always()
        run: |
          echo "## Solana Program Test Results (${{ matrix.device }} - ${{ matrix.program }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/solana-program-cs-tester-output.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            sed -n '/SOLANA PROGRAM TEST/,/^└/p' /tmp/solana-program-cs-tester-output.log >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '/SOLANA PROGRAM SUMMARY/,/^└/p' /tmp/solana-program-cs-tester-output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test output available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: solana-program-cs-tester-logs-${{ matrix.device }}-${{ matrix.program }}
          path: /tmp/logs/
          retention-days: 7
